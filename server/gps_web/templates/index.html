<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Track Viewer</title>

  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; }

    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 4px;
    }
    nav a:hover { background: #334155; color: #f8fafc; }
    nav a.active { background: #0ea5e9; color: #fff; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .controls label { font-size: 0.8rem; color: #94a3b8; white-space: nowrap; }
    .controls input[type="datetime-local"] {
      background: #334155;
      border: 1px solid #475569;
      color: #f8fafc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.85rem;
    }
    .controls input[type="datetime-local"]:focus { outline: 2px solid #38bdf8; }

    button {
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #475569; cursor: default; }

    #status {
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    #status.error { color: #f87171; }
    #status.ok    { color: #4ade80; }

    #map { flex: 1; }

    /* ポップアップ */
    .point-popup { font-size: 0.85rem; line-height: 1.6; }
    .point-popup .no-fix { color: #f87171; font-size: 0.75rem; }

    /* ライトボックス */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lb-img {
      max-width: 90vw; max-height: 80vh;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      user-select: none;
    }
    .lb-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 52px; height: 52px;
      font-size: 1.6rem;
      cursor: pointer;
      position: absolute;
      top: 50%; transform: translateY(-50%);
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.28); }
    .lb-btn:disabled { opacity: 0.2; cursor: default; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
    #lb-close {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.12);
      color: #fff; border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 1rem; cursor: pointer;
      transition: background 0.15s;
    }
    #lb-close:hover { background: rgba(255,255,255,0.28); }
    #lb-info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #f8fafc; font-size: 0.85rem;
      text-align: center; white-space: nowrap;
      pointer-events: none;
    }
    #lb-count { color: #94a3b8; margin-left: 10px; }
    .thumb-click {
      cursor: zoom-in;
      transition: opacity 0.1s;
    }
    .thumb-click:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>Car Logger</h1>
  <nav>
    <a href="/" class="active">GPS軌跡</a>
    <a href="/temperature">温度グラフ</a>
  </nav>
  <div class="controls">
    <label>開始</label>
    <input type="datetime-local" id="start" />
    <label>終了</label>
    <input type="datetime-local" id="end" />
    <button id="search-btn" onclick="search()">表示</button>
    <button onclick="setToday()">今日</button>
    <button onclick="setLast24h()">直近24時間</button>
    <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;color:#94a3b8;cursor:pointer">
      <input type="checkbox" id="show-geo" checked onchange="toggleGeo()"> WiFi測位
    </label>
    <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;color:#94a3b8;cursor:pointer">
      <input type="checkbox" id="show-photos" checked onchange="togglePhotos()"> カメラ
    </label>
    <span id="status"></span>
  </div>
</header>

<div id="map"></div>

<!-- ライトボックス -->
<div id="lightbox" role="dialog" aria-modal="true" onclick="onLightboxBgClick(event)">
  <div id="lb-info">
    <span id="lb-time"></span><span id="lb-count"></span>
  </div>
  <button id="lb-close" onclick="closeLightbox()" title="閉じる (Esc)">✕</button>
  <button class="lb-btn" id="lb-prev" onclick="lightboxStep(-1)" title="前の画像 (←)">&#8249;</button>
  <img id="lb-img" src="" alt="拡大写真">
  <button class="lb-btn" id="lb-next" onclick="lightboxStep(1)"  title="次の画像 (→)">&#8250;</button>
</div>

<script>
// ---- 地図初期化 ----
const map = L.map('map').setView([35.6812, 139.7671], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

let trackLayer = null;
let markerLayer = null;
let geoLayer = null;
let photoLayer = null;

// ライトボックス用グローバル状態
let allPhotos = [];
let currentPhotoIdx = 0;

// ---- 最新位置を取得して初期表示位置に使う ----
fetch('/api/latest')
  .then(r => r.json())
  .then(data => {
    if (data.point) {
      map.setView([data.point.lat, data.point.lon], 14);
    }
  });

// ---- 日時ユーティリティ ----
function toLocalISO(d) {
  // datetime-local 用の "YYYY-MM-DDTHH:MM" 文字列に変換（ローカル時刻）
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function setToday() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0);
  document.getElementById('start').value = toLocalISO(start);
  document.getElementById('end').value = toLocalISO(now);
}

function setLast24h() {
  const now = new Date();
  const start = new Date(now.getTime() - 24 * 60 * 60 * 1000);
  document.getElementById('start').value = toLocalISO(start);
  document.getElementById('end').value = toLocalISO(now);
}

// ---- 初期値: 直近24時間 ----
setLast24h();

// ---- 軌跡検索 ----
async function search() {
  const start = document.getElementById('start').value;
  const end   = document.getElementById('end').value;
  const status = document.getElementById('status');
  const btn = document.getElementById('search-btn');

  if (!start || !end) {
    setStatus('開始・終了日時を入力してください', 'error');
    return;
  }

  btn.disabled = true;
  setStatus('読み込み中…', '');

  try {
    const qs = `start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
    const [trackRes, geoRes, photoRes] = await Promise.all([
      fetch(`/api/track?${qs}`),
      fetch(`/api/geolocation?${qs}`),
      fetch(`/api/photos?${qs}`),
    ]);
    const trackData = await trackRes.json();
    const geoData   = await geoRes.json();
    const photoData = await photoRes.json();

    if (trackData.error) { setStatus(trackData.error, 'error'); return; }

    drawTrack(trackData.points);
    drawGeolocation(geoData.points || []);
    drawPhotos(photoData.photos || []);
    setStatus(
      `GPS ${trackData.count}件 / WiFi測位 ${geoData.count ?? 0}件 / カメラ ${photoData.count ?? 0}件`,
      'ok',
    );
  } catch (e) {
    setStatus('通信エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ---- 地図描画 ----
function drawTrack(points) {
  // 既存レイヤーを削除
  if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }
  if (markerLayer) { map.removeLayer(markerLayer); markerLayer = null; }

  if (points.length === 0) {
    setStatus('該当するデータがありません', '');
    return;
  }

  const latlngs = points.map(p => [p.lat, p.lon]);

  // 軌跡ライン
  trackLayer = L.polyline(latlngs, { color: '#0ea5e9', weight: 3, opacity: 0.8 }).addTo(map);

  // マーカーグループ（クリックでポップアップ）
  markerLayer = L.layerGroup().addTo(map);

  // 始点・終点は大きいマーカー、途中は小さいサークル
  points.forEach((p, i) => {
    const isFirst = i === 0;
    const isLast  = i === points.length - 1;
    const jstTime = toJSTString(p.recorded_at);
    const popup = buildPopup(p, jstTime);

    if (isFirst || isLast) {
      const color = isFirst ? '#22c55e' : '#ef4444';
      const label = isFirst ? 'S' : 'E';
      const icon = L.divIcon({
        className: '',
        html: `<div style="background:${color};color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)">${label}</div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      });
      L.marker([p.lat, p.lon], { icon }).bindPopup(popup).addTo(markerLayer);
    } else {
      const color = p.has_fix ? '#0ea5e9' : '#f97316';
      L.circleMarker([p.lat, p.lon], {
        radius: 4, color, fillColor: color, fillOpacity: 0.9, weight: 1,
      }).bindPopup(popup).addTo(markerLayer);
    }
  });

  map.fitBounds(trackLayer.getBounds(), { padding: [24, 24] });
}

function buildPopup(p, jstTime) {
  const fixBadge = p.has_fix ? '' : '<span class="no-fix">⚠ キャッシュ値</span><br>';
  const alt   = p.alt      != null ? `${p.alt.toFixed(1)} m`   : '—';
  const speed = p.speed_kmh != null ? `${p.speed_kmh.toFixed(1)} km/h` : '—';
  return `<div class="point-popup">
    ${fixBadge}
    <b>${jstTime}</b><br>
    緯度: ${p.lat.toFixed(6)}<br>
    経度: ${p.lon.toFixed(6)}<br>
    高度: ${alt}<br>
    速度: ${speed}
  </div>`;
}

function toJSTString(isoUtc) {
  try {
    const d = new Date(isoUtc);
    return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
  } catch {
    return isoUtc;
  }
}

// ---- WiFi測位マーカー描画 ----
function drawGeolocation(points) {
  if (geoLayer) { map.removeLayer(geoLayer); geoLayer = null; }
  if (!points.length) return;

  geoLayer = L.layerGroup().addTo(map);
  points.forEach(p => {
    const jstTime = toJSTString(p.recorded_at);
    const dist = p.distance_m != null ? `${p.distance_m.toFixed(0)}m` : '—';
    const acc  = p.accuracy_m != null ? `${p.accuracy_m.toFixed(0)}m` : '—';
    const popup = `<div class="point-popup">
      <b style="color:#fb923c">📶 WiFi測位</b><br>
      <b>${jstTime}</b><br>
      緯度: ${p.lat.toFixed(6)}<br>
      経度: ${p.lon.toFixed(6)}<br>
      推定誤差: ${acc}<br>
      GPS差: ${dist}
    </div>`;

    // 誤差円
    if (p.accuracy_m) {
      L.circle([p.lat, p.lon], {
        radius: p.accuracy_m,
        color: '#fb923c', fillColor: '#fb923c', fillOpacity: 0.08, weight: 1,
      }).addTo(geoLayer);
    }
    // 菱形マーカー
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;background:#fb923c;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6],
    });
    L.marker([p.lat, p.lon], { icon }).bindPopup(popup).addTo(geoLayer);
  });

  if (!document.getElementById('show-geo').checked) {
    map.removeLayer(geoLayer);
  }
}

function toggleGeo() {
  if (!geoLayer) return;
  if (document.getElementById('show-geo').checked) {
    map.addLayer(geoLayer);
  } else {
    map.removeLayer(geoLayer);
  }
}

// ---- カメラ写真マーカー描画 ----
function drawPhotos(photos) {
  if (photoLayer) { map.removeLayer(photoLayer); photoLayer = null; }
  allPhotos = photos;
  if (!photos.length) return;

  photoLayer = L.layerGroup().addTo(map);
  photos.forEach((p, idx) => {
    if (p.lat == null || p.lon == null) return;
    const jstTime = toJSTString(p.recorded_at);
    const popup = `<div class="point-popup">
      <b style="color:#a855f7">&#128247; カメラ</b><br>
      <b>${jstTime}</b><br>
      <div style="width:240px;height:180px;margin-top:4px;border-radius:4px;overflow:hidden;background:#0f172a;cursor:zoom-in"
           onclick="openLightbox(${idx})" title="クリックで拡大">
        <img src="/api/photo/${p.id}"
             style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      緯度: ${p.lat.toFixed(6)}<br>
      経度: ${p.lon.toFixed(6)}
    </div>`;

    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#a855f7;width:14px;height:14px;border-radius:3px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });
    L.marker([p.lat, p.lon], { icon }).bindPopup(popup, { maxWidth: 280 }).addTo(photoLayer);
  });

  if (!document.getElementById('show-photos').checked) {
    map.removeLayer(photoLayer);
  }
}

// ---- ライトボックス操作 ----
function openLightbox(idx) {
  currentPhotoIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  map.keyboard.disable();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  map.keyboard.enable();
}

function onLightboxBgClick(e) {
  // オーバーレイ背景のみクリックで閉じる（画像・ボタンはスルー）
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lightboxStep(delta) {
  const next = currentPhotoIdx + delta;
  if (next < 0 || next >= allPhotos.length) return;
  currentPhotoIdx = next;
  updateLightbox();
}

function updateLightbox() {
  const p = allPhotos[currentPhotoIdx];
  document.getElementById('lb-img').src = `/api/photo/${p.id}`;
  document.getElementById('lb-time').textContent = toJSTString(p.recorded_at);
  document.getElementById('lb-count').textContent = ` ${currentPhotoIdx + 1} / ${allPhotos.length}`;
  document.getElementById('lb-prev').disabled = currentPhotoIdx === 0;
  document.getElementById('lb-next').disabled = currentPhotoIdx === allPhotos.length - 1;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')      { closeLightbox(); e.preventDefault(); }
  if (e.key === 'ArrowLeft')   { lightboxStep(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight')  { lightboxStep(1);  e.preventDefault(); }
});

function togglePhotos() {
  if (!photoLayer) return;
  if (document.getElementById('show-photos').checked) {
    map.addLayer(photoLayer);
  } else {
    map.removeLayer(photoLayer);
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}
</script>

</body>
</html>
